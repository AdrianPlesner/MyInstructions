name: CI

# Run on every push to every branch and on every pull request.
# Using a concurrency group prevents redundant runs when a new commit is pushed
# to a branch that already has an in-progress CI run.
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: ./gradlew lint

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        # Always upload so failures are visible even when the step itself fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/

  # ── 3. Build ───────────────────────────────────────────────────────────────
  # Only assemble the APK once lint and tests are green.
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  # ── 4. Gate ────────────────────────────────────────────────────────────────
  # A single synthetic job that only succeeds when every other job passes.
  # Configure this as the one required status check in branch-protection rules
  # so you never need to update the rule when adding new jobs.
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, unit-test, build]
    # Run even if an upstream job was skipped (e.g. on a draft PR) so the
    # check is always reported back to GitHub.
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          for result in $results; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more required jobs did not succeed (got: $result)"
              exit 1
            fi
          done
          echo "All required jobs passed."
